name: CI Pipeline

on: 
  push:
    branches: 
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
        
      - name: Docker login
        uses: docker/login-action@v3
        with: 
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Build docker 
        run: docker build -t myapp .

      - name: tag docker image
        run: docker tag myapp ${{secrets.DOCKER_USERNAME}}/myapp:v2
        
      - name: push docker image
        run: docker push ${{secrets.DOCKER_USERNAME}}/myapp:v2

  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Run tests
        run: echo "running tests"

  deply:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Deploying app on Ec2 server
        run: echo "deployment successfull"
